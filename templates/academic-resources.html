<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic Resources & PDFs</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --card-bg: #1e293b;
            --primary-gradient: linear-gradient(135deg, #3b82f6, #8b5cf6);
            --secondary-gradient: linear-gradient(135deg, #10b981, #3b82f6);
            --accent-gradient: linear-gradient(135deg, #f59e0b, #ef4444);
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .header-container {
            text-align: center;
            margin-bottom: 40px;
            padding: 40px 20px;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        h1 {
            background: var(--primary-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-size: 2.5rem;
            margin: 0 0 10px 0;
        }

        .search-bar {
            width: 100%;
            max-width: 500px;
            padding: 15px 20px;
            margin-top: 20px;
            border-radius: 30px;
            border: 1px solid #475569;
            outline: none;
            font-size: 1rem;
            background-color: #334155;
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }
        
        select.search-bar { cursor: pointer; }
        input[type="file"].search-bar { padding: 12px 20px; }

        .search-bar:focus {
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
            background-color: #475569;
        }

        .upload-form {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            max-width: 600px;
            margin: 20px auto 0 auto;
        }

        .section-title {
            font-size: 1.8rem;
            margin-bottom: 20px;
            border-left: 5px solid #8b5cf6;
            padding-left: 15px;
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            margin-bottom: 50px;
        }

        .empty-message {
            color: #94a3b8;
            font-style: italic;
            padding: 20px;
            background: var(--card-bg);
            border-radius: 12px;
            text-align: center;
        }

        .resource-card {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 25px;
            position: relative;
            overflow: hidden;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .resource-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 5px;
            background: var(--primary-gradient);
        }

        .card-assignment::before { background: var(--secondary-gradient); }
        .card-syllabus::before { background: var(--accent-gradient); }

        .resource-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 30px rgba(0, 0, 0, 0.4);
        }

        .resource-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .resource-desc {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 20px;
        }

        .download-btn {
            display: inline-block;
            text-decoration: none;
            color: white;
            background: var(--primary-gradient);
            padding: 12px 20px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: opacity 0.3s;
        }
        
        .btn-assignment { background: var(--secondary-gradient); }
        .btn-syllabus { background: var(--accent-gradient); }

        .download-btn:hover {
            opacity: 0.85;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: #3b82f6;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }
        .back-btn:hover { color: #8b5cf6; }

    </style>
</head>
<body>

    <a href="/" class="back-btn">← Back to Dashboard</a>

    <!-- Top Header & Upload Area -->
    <div class="header-container">
        <h1>Academic Resources Hub</h1>
        <p>Upload and access units, assignments, and syllabus materials dynamically.</p>
        
        <!-- Upload Form -->
        <form id="uploadForm" class="upload-form" onsubmit="handleUpload(event)">
            <input type="text" id="title" name="title" class="search-bar" placeholder="Enter Resource Title (e.g., Unit 1 Notes)" style="max-width: 100%; margin-top:0;" required>
            <input type="text" id="description" name="description" class="search-bar" placeholder="Short Description..." style="max-width: 100%; margin-top:0;" required>
            <select id="category" name="category" class="search-bar" style="max-width: 100%; margin-top:0;" required>
                <option value="unit">Unit & Lesson Material</option>
                <option value="assignment">Assignment Question</option>
                <option value="syllabus">Syllabus & Extra Material</option>
            </select>
            <input type="file" id="fileInput" name="file" class="search-bar" accept=".pdf,.doc,.docx,.ppt,.pptx" style="max-width: 100%; margin-top:0;" required>
            <button type="submit" class="download-btn" style="width: 100%;">Upload Resource</button>
        </form>

        <hr style="border-color: #334155; margin: 30px 0;">
        <input type="text" id="searchInput" class="search-bar" placeholder="Search uploaded resources..." onkeyup="filterResources()">
    </div>

    <!-- Dynamic Sections -->
    <h2 class="section-title">Units & Lessons</h2>
    <div class="grid-container" id="unitsGrid">
        <div class="empty-message">No units uploaded yet.</div>
    </div>

    <h2 class="section-title">Assignment Questions</h2>
    <div class="grid-container" id="assignmentsGrid">
         <div class="empty-message">No assignments uploaded yet.</div>
    </div>

    <h2 class="section-title">Syllabus & Extra Materials</h2>
    <div class="grid-container" id="syllabusGrid">
         <div class="empty-message">No syllabus materials uploaded yet.</div>
    </div>

    <script>
        // Fetch and load resources on page load
        window.onload = loadResources;

        async function loadResources() {
            try {
                const response = await fetch('/api/get_resources');
                const resources = await response.json();

                const unitsGrid = document.getElementById('unitsGrid');
                const assignmentsGrid = document.getElementById('assignmentsGrid');
                const syllabusGrid = document.getElementById('syllabusGrid');

                // Clear previous contents
                unitsGrid.innerHTML = '';
                assignmentsGrid.innerHTML = '';
                syllabusGrid.innerHTML = '';

                let hasUnits = false, hasAssignments = false, hasSyllabus = false;

                resources.forEach(res => {
                    let cardClass = "card-unit";
                    let btnClass = "";
                    let targetGrid = unitsGrid;
                    
                    if (res.category === 'assignment') {
                        cardClass = "card-assignment";
                        btnClass = "btn-assignment";
                        targetGrid = assignmentsGrid;
                        hasAssignments = true;
                    } else if (res.category === 'syllabus') {
                        cardClass = "card-syllabus";
                        btnClass = "btn-syllabus";
                        targetGrid = syllabusGrid;
                        hasSyllabus = true;
                    } else {
                        hasUnits = true;
                    }

                    const cardHTML = `
                        <div class="resource-card ${cardClass}">
                            <div>
                                <div class="resource-title">${res.title}</div>
                                <div class="resource-desc">${res.description}</div>
                            </div>
                            <a href="${res.filepath}" class="download-btn ${btnClass}" target="_blank">View / Download</a>
                        </div>
                    `;
                    targetGrid.innerHTML += cardHTML;
                });

                // Fallback for empty grids
                if (!hasUnits) unitsGrid.innerHTML = '<div class="empty-message">No units uploaded yet.</div>';
                if (!hasAssignments) assignmentsGrid.innerHTML = '<div class="empty-message">No assignments uploaded yet.</div>';
                if (!hasSyllabus) syllabusGrid.innerHTML = '<div class="empty-message">No syllabus materials uploaded yet.</div>';

            } catch (error) {
                console.error("Error loading resources:", error);
            }
        }

        async function handleUpload(event) {
            event.preventDefault();
            const form = document.getElementById('uploadForm');
            const formData = new FormData(form);

            try {
                const response = await fetch('/api/upload_resource', {
                    method: 'POST',
                    body: formData
                });
                
                const result = await response.json();
                if (result.status === "success") {
                    alert(result.message);
                    form.reset();
                    loadResources(); // Refresh the grids immediately
                } else {
                    alert("Error: " + result.message);
                }
            } catch (error) {
                console.error("Upload failed:", error);
                alert("Upload failed. Please try again.");
            }
        }

        function filterResources() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.getElementsByClassName('resource-card');

            for (let i = 0; i < cards.length; i++) {
                let title = cards[i].getElementsByClassName('resource-title')[0].innerText.toLowerCase();
                let desc = cards[i].getElementsByClassName('resource-desc')[0].innerText.toLowerCase();
                
                if (title.includes(input) || desc.includes(input)) {
                    cards[i].style.display = "flex";
                } else {
                    cards[i].style.display = "none";
                }
            }
        }
    </script>

</body>
</html>
