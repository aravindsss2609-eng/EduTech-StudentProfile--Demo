<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>EduConnect AI Hub - File Problem Report</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-base: #0b0f19; --bg-sidebar: #111827; --bg-card: #1f2937; --primary: #2563eb; --text-main: #f9fafb; --text-muted: #9ca3af; --border: #374151; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: sans-serif; background: var(--bg-base); color: var(--text-main); display: flex; height: 100vh; }
        .sidebar { width: 260px; background: var(--bg-sidebar); padding: 1.5rem; border-right: 1px solid var(--border); }
        .brand { font-size: 1.2rem; font-weight: bold; margin-bottom: 2rem; display: flex; align-items: center; gap: 0.5rem; }
        .nav-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
        .nav-item a { display: block; padding: 0.75rem 1rem; color: var(--text-muted); text-decoration: none; border-radius: 8px; }
        .nav-item.active a, .nav-item a:hover { background: var(--primary); color: white; }
        .main-content { flex: 1; padding: 2rem; overflow-y: auto; }
        .form-panel { background: var(--bg-card); padding: 2rem; border-radius: 12px; border: 1px solid var(--border); max-width: 650px; }
        .form-group { margin-bottom: 1.25rem; }
        label { display: block; margin-bottom: 0.5rem; color: var(--text-muted); font-size: 0.9rem; }
        input, select, textarea { background: var(--bg-base); border: 1px solid var(--border); color: white; padding: 0.65rem; border-radius: 6px; width: 100%; font-size: 0.95rem; }
        textarea { height: 120px; resize: none; }
        .action-btn { background: #dc2626; border: none; color: white; padding: 0.75rem 1.5rem; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; transition: background 0.2s; }
        .action-btn:hover { background: #b91c1c; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="brand"><i class="fa-solid fa-brain"></i> EduConnect AI</div>
        <ul class="nav-list">
    <li class="nav-item"><a href="/">Dashboard Operations</a></li>
    <li class="nav-item"><a href="/student-profiles">Student Profiles Portfolio</a></li>
    <li class="nav-item"><a href="/predictive-analytics">Statistical Risk Analytics</a></li>
    <li class="nav-item"><a href="/behavioral-matrix">Behavioral Dynamics Matrix</a></li>
    <li class="nav-item"><a href="/historical-timeline">System History Timelines</a></li>
    <li class="nav-item"><a href="/report-issue">Report An Issue</a></li>
    <li class="nav-item"><a href="/report-history">Grievance Archives</a></li>
</ul>
    </div>
    <div class="main-content">
        <h2 style="margin-bottom: 1.5rem;"><i class="fa-solid fa-triangle-exclamation" style="color:#dc2626;"></i> System Grievance Reporting Console</h2>
        <div class="form-panel">
            <div class="form-group">
                <label>Identify Your Role Context</label>
                <select id="rep_role">
                    <option value="Student">Student Cohort</option>
                    <option value="Teacher">Academic Teacher Staff</option>
                    <option value="Staff">Operations / Administration Staff</option>
                </select>
            </div>
            <div class="form-group">
                <label>Reporter Identification Signature (Leave blank for Anonymous)</label>
                <input id="rep_name" placeholder="E.g., Dr. Aris / Anonymous">
            </div>
            <div class="form-group">
                <label>Issue Classification Category</label>
                <select id="rep_cat">
                    <option value="Academic Stress">Academic Stress & Workload Pressure</option>
                    <option value="Infrastructure Defect">Campus Infrastructure or Tool Fault</option>
                    <option value="Behavioral Concern">Behavioral Concern / Interpersonal Conflict</option>
                    <option value="Transit Disruption">Transit Safety / Smart Bus System Bug</option>
                </select>
            </div>
            <div class="form-group">
                <label>Urgency Threshold Vector</label>
                <select id="rep_urgency">
                    <option value="Low">Low (Routine Optimization)</option>
                    <option value="Medium">Medium (Needs Intervention within 24 Hours)</option>
                    <option value="High Critical">High Critical (Immediate Operational Response)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Elaborate Detailed Description of Incident</label>
                <textarea id="rep_desc" placeholder="Provide clear contextual metadata regarding the technical issue or concern..."></textarea>
            </div>
            <button class="action-btn" onclick="lodgeIncidentReport()">Transmit Confidential Report Vector</button>
        </div>
    </div>
    <script>
        async function lodgeIncidentReport() {
            const payload = {
                reporter_role: document.getElementById('rep_role').value,
                reporter_name: document.getElementById('rep_name').value,
                issue_category: document.getElementById('rep_cat').value,
                urgency_level: document.getElementById('rep_urgency').value,
                description: document.getElementById('rep_desc').value
            };
            
            if(!payload.description) { alert("Please provide a description of the incident before submission."); return; }
            
            const res = await fetch('/api/add_report', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            const data = await res.json();
            alert(data.message);
            
            // Clear inputs and send the user to the log matrix tracking layout page
            document.getElementById('rep_name').value = '';
            document.getElementById('rep_desc').value = '';
            window.location.href = '/report-history';
        }
    </script>
</body>
</html>
