<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>System History Timelines</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --bg-base: #0b0f19; --bg-sidebar: #111827; --bg-card: #1f2937; --primary: #2563eb; --text-main: #f9fafb; --text-muted: #9ca3af; --border: #374151; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: sans-serif; background: var(--bg-base); color: var(--text-main); display: flex; height: 100vh; }
        .sidebar { width: 260px; background: var(--bg-sidebar); padding: 1.5rem; border-right: 1px solid var(--border); }
        .brand { font-size: 1.2rem; font-weight: bold; margin-bottom: 2rem; display: flex; align-items: center; gap: 0.5rem; }
        .nav-list { list-style: none; display: flex; flex-direction: column; gap: 0.5rem; }
        .nav-item a { display: block; padding: 0.75rem 1rem; color: var(--text-muted); text-decoration: none; border-radius: 8px; }
        .nav-item.active a { background: var(--primary); color: white; }
        .main-content { flex: 1; padding: 2rem; overflow-y: auto; }
        .timeline-stack { display: flex; flex-direction: column; gap: 1rem; margin-top: 1.5rem; }
        .log-row-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 1.25rem; display: flex; justify-content: space-between; align-items: center; }
        .tag-pill { background: var(--bg-base); padding: 0.5rem 1rem; border-radius: 6px; font-size: 0.9rem; border: 1px solid var(--border); }
        .empty-warn { padding: 3rem; text-align: center; border: 2px dashed var(--border); border-radius: 12px; color: var(--text-muted); margin-top: 2rem; }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="brand"><i class="fa-solid fa-brain"></i> EduConnect AI</div>
       <ul class="nav-list">
    <li class="nav-item"><a href="/">Dashboard Operations</a></li>
    <li class="nav-item"><a href="/student-profiles">Student Profiles Portfolio</a></li>
    <li class="nav-item"><a href="/predictive-analytics">Statistical Risk Analytics</a></li>
    <li class="nav-item"><a href="/behavioral-matrix">Behavioral Dynamics Matrix</a></li>
    <li class="nav-item"><a href="/historical-timeline">System History Timelines</a></li>
    <li class="nav-item"><a href="/report-issue">Report An Issue</a></li>
    <li class="nav-item"><a href="/report-history">Grievance Archives</a></li>
</ul>
    </div>
    <div class="main-content">
        <h2>System Logs Architecture History (7-Day Rolling Data Framework)</h2>
        <div class="timeline-stack" id="timeline-box"></div>
    </div>
    <script>
        async function fetchHistoryLogs() {
            const res = await fetch('/api/get_logs');
            const logs = await res.json();
            const box = document.getElementById('timeline-box');
            box.innerHTML = '';
            if(logs.length === 0) {
                box.innerHTML = `<div class="empty-warn">No operational records found. Add student profiles via Dashboard Operations to generate timeline metrics.</div>`;
                return;
            }
            logs.forEach(log => {
                box.innerHTML += `
                    <div class="log-row-card">
                        <div style="font-weight:bold;"><i class="fa-regular fa-calendar"></i> Temporal Boundary: ${log.date}</div>
                        <div class="tag-pill">Anxiety Factor: <strong style="color:#ef4444;">${log.anxiety}</strong></div>
                        <div class="tag-pill">XP Velocity: <strong style="color:#f59e0b;">${log.velocity}</strong></div>
                        <div class="tag-pill">Safety Clearance: <strong style="color:#10b981;">${log.safety}</strong></div>
                    </div>
                `;
            });
        }
        window.onload = fetchHistoryLogs;
    </script>
</body>
</html>
